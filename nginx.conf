server {
    listen 8085;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Serve hashed assets directly (JS, CSS, images) - full path
    location ~ ^/bfsi-agentic-suite/admin/dashboard/(assets|static)/(.*)$ {
        try_files /$1/$2 =404;
        expires max;
        add_header Cache-Control "public, immutable";
    }

    # Serve hashed assets when upstream strips the prefix (assets/... lands at root)
    location ~ ^/(assets|static)/(.*)$ {
        try_files /bfsi-agentic-suite/admin/dashboard/$1/$2 =404;
        expires max;
        add_header Cache-Control "public, immutable";
    }

    # Serve admin config JSON directly (must come before SPA catch-all)
    location = /bfsi-agentic-suite/admin/dashboard/admin-config.json {
        try_files /admin-config.json =404;
        add_header Content-Type application/json;
    }

    # Handle SPA routing for the app - full path preserved
    location /bfsi-agentic-suite/admin/dashboard {
        try_files $uri $uri/ /index.html;
    }

    # Proxy agentic user auth endpoints
    location /agenticUser/ {
        proxy_pass https://bfsi.searchunify.com/agenticUser/;
        proxy_set_header Host bfsi.searchunify.com;
        proxy_set_header Content-Type application/json;
        proxy_set_header accept "application/json, text/plain, */*";
        proxy_ssl_server_name on;
        proxy_pass_request_headers on;
    }

    # Handle SPA routing when upstream strips prefix (e.g. /home, /login)
    location / {
        try_files $uri $uri/ /index.html;
    }
}